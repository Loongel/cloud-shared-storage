version: "3.8"

configs:
  css_scenario_workload:
    file: ../scenario-test/workload.sh

services:
  p_s_a_p_n:
    image: "${CSS_TEST_WORKLOAD_IMAGE:-busybox:1.36}"
    command: ["/bin/sh", "/usr/local/bin/css-scenario-workload"]
    configs:
      - source: css_scenario_workload
        target: /usr/local/bin/css-scenario-workload
        mode: 0555
    environment:
      CSS_TEST_RUN_ID: "${CSS_TEST_RUN_ID}"
      CSS_TEST_PROFILE: "${CSS_TEST_PROFILE:-full}"
      CSS_TEST_NODE_NAMES: "${CSS_TEST_NODE_NAMES}"
      CSS_TEST_EXPECT_NODES: "${CSS_TEST_EXPECT_NODES}"
      CSS_TEST_WRITER_NODE: "${CSS_TEST_WRITER_NODE}"
      CSS_TEST_VERIFY_TIMEOUT: "${CSS_TEST_VERIFY_TIMEOUT:-60}"
      CSS_TEST_FLUSH_SETTLE_SECONDS: "${CSS_TEST_FLUSH_SETTLE_SECONDS:-10}"
      CSS_TEST_SCENARIO: "p_s_a_p_n"
      CSS_TEST_VOLUME: "css_p_s_a_p_n"
      CSS_TEST_MODE: "private"
      CSS_TEST_WRITE: "single"
      CSS_TEST_ENGINE: "auto"
      CSS_TEST_CRYPT: "false"
      CSS_TEST_BACKUP: "false"
      CSS_TEST_WORKLOAD: "private-file"
      NODE_NAME: "{{.Node.Hostname}}"
      SERVICE_NAME: "{{.Service.Name}}"
      TASK_SLOT: "{{.Task.Slot}}"
    deploy:
      mode: global
      labels:
        css.test.scenario: "p_s_a_p_n"
        css.test.mode: "private"
        css.test.write: "single"
        css.test.engine: "auto"
        css.test.crypt: "false"
        css.test.backup: "false"
        css.test.workload: "private-file"
      placement:
        constraints:
          - node.labels.css.test.enabled == true
      restart_policy:
        condition: none
    volumes:
      - css_p_s_a_p_n:/data

  p_s_a_e_n:
